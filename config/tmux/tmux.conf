# 1. Change prefix from C-b to Ctrl-/
unbind C-b
set -g prefix C-_
bind C-_ send-prefix

# 2. Intuitive split commands (using | and -)
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# 3. Easy config reload
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# 4. Window-numbering QoL
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g history-limit 50000


# 5. Fast pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


# --- Make Neovim happy inside tmux ---------------------------------------
# Truecolor: advertise 256-color and pass through 24-bit RGB.
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# Undercurl + colored underlines (LSP diagnostics squiggles). Ghostty supports both.
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Don't wait after Esc, otherwise mode switches in Neovim feel laggy.
set -sg escape-time 10

# Pass modified keys (Shift+Enter, etc.) through to apps that request them,
# e.g. Claude Code multiline input. Without this tmux strips the modifier.
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Let Neovim see focus changes (autoread, FocusGained/Lost autocmds).
set -g focus-events on

# Forward OSC52 so Neovim yanks reach the macOS clipboard (works over SSH too).
set -g set-clipboard on

# Let escape sequences through (image.nvim, Kitty graphics, OSC). Ghostty supports them.
set -g allow-passthrough on

# --- Smart pane switching with awareness of Vim splits -------------------
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
# tmux >= 3.0 (we're on 3.6); the legacy version-shim has been dropped.
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
